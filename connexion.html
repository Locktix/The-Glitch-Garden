<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="img/logo.png">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/connexion.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<title>The Glitch Garden - Connexion</title>
</head>
<body>
	<header>
		<div class="centrage header-content">
			<a href="index.html"><img src="img/logo.png" alt="Logo The Glitch Garden"></a>
			<a id="site-title" href="index.html">The Glitch Garden</a>
			<nav>
				<ul class="main-nav">
					<li><a href="index.html">Accueil</a></li>
					<li><a href="contact.html">Contact</a></li>
					<li><a href="prestations.html">Prestations</a></li>
					<li><a href="artistes.html">Artistes</a></li>
				</ul>
				
				<ul>
					<li><a href="connexion.html" id="current">Connexion</a></li>
					<li><a href="inscription.html">S'inscrire</a></li>
				</ul>
			</nav>
		</div>
	</header>

	<main class="centrage">
		<section class="login-section">
			<h2>Connexion</h2>
			<form action="#" method="post" class="login-form">
				<label for="email">Adresse e-mail :</label>
				<input type="email" id="email" name="email" required>

				<label for="password">Mot de passe :</label>
				<div class="password-container">
					<input type="password" id="password" name="password" required>
					<button type="button" id="togglePassword" aria-label="Afficher le mot de passe">
					<i class="fas fa-eye"></i> </button>
				</div>
				
				<a href="#" id="forgot-password">Mot de passe oublié ?</a>

				<button type="submit">Se connecter</button>
			</form>
		</section>
	</main>

	<footer>
		<div class="centrage">
			<p>&copy; 2025 The Glitch Garden</p>
		</div>
	</footer>
</body>
</html>
